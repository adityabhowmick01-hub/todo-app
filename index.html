<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do App</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a2e;
      --subtext: #888;
      --border: #e0e0e0;
      --item-bg: #fafafa;
      --item-border: #f0f0f0;
      --accent: #6c63ff;
      --accent-hover: #574fd6;
      --accent-light: #f0eeff;
      --done-text: #aaa;
      --shadow: rgba(0,0,0,0.08);
      --input-bg: #ffffff;
      --high: #ff4d4d;
      --med: #ff9500;
      --low: #34c759;
    }
    [data-theme="dark"] {
      --bg: #0f0f1a; --card: #1e1e2e; --text: #e0e0f0; --subtext: #666;
      --border: #333355; --item-bg: #16162a; --item-border: #2a2a44;
      --accent: #7c73ff; --accent-hover: #6c63ff; --accent-light: #1a1a3a;
      --done-text: #555; --shadow: rgba(0,0,0,0.4); --input-bg: #16162a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); min-height: 100vh;
      display: flex; justify-content: center; padding: 40px 16px;
      transition: background 0.3s;
    }
    .container {
      background: var(--card); border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow); padding: 32px;
      width: 100%; max-width: 640px; height: fit-content; transition: background 0.3s;
    }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    h1 { font-size: 1.8rem; color: var(--text); }
    .subtitle { color: var(--subtext); font-size: 0.9rem; margin-bottom: 20px; }
    .dark-toggle {
      background: none; border: 2px solid var(--border); border-radius: 8px;
      padding: 6px 10px; cursor: pointer; font-size: 1.1rem; color: var(--text); transition: all 0.2s;
    }
    .dark-toggle:hover { border-color: var(--accent); }

    /* Progress */
    .progress-wrap { margin-bottom: 20px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--subtext); margin-bottom: 6px; }
    .progress-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 99px; transition: width 0.4s ease; }

    /* Search */
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-input {
      flex: 1; padding: 10px 14px; border: 2px solid var(--border); border-radius: 10px;
      font-size: 0.95rem; background: var(--input-bg); color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Add form */
    .add-form {
      background: var(--item-bg); border: 1px solid var(--item-border);
      border-radius: 12px; padding: 16px; margin-bottom: 20px;
    }
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    input[type="text"], textarea {
      flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px;
      font-size: 1rem; background: var(--input-bg); color: var(--text); outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; padding: 10px 14px; font-size: 0.9rem; }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    select, input[type="date"] {
      padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; background: var(--input-bg); color: var(--text);
      outline: none; cursor: pointer; transition: border-color 0.2s;
    }
    select:focus, input[type="date"]:focus { border-color: var(--accent); }
    button.add-btn {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      padding: 12px 20px; font-size: 1rem; cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    button.add-btn:hover { background: var(--accent-hover); }

    /* Controls */
    .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-btn {
      background: none; border: 2px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 0.85rem; cursor: pointer; color: var(--subtext); transition: all 0.2s;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .sort-select {
      margin-left: auto; padding: 6px 10px; border: 2px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; background: var(--input-bg); color: var(--text); cursor: pointer; outline: none;
    }
    .category-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .cat-btn {
      background: none; border: 2px solid var(--border); border-radius: 20px;
      padding: 4px 12px; font-size: 0.8rem; cursor: pointer; color: var(--subtext); transition: all 0.2s;
    }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Todo items */
    .todo-list { list-style: none; }
    .todo-item {
      border-radius: 10px; margin-bottom: 10px;
      background: var(--item-bg); border: 1px solid var(--item-border);
      border-left: 4px solid transparent; transition: opacity 0.2s;
      overflow: hidden;
    }
    .todo-item.done { opacity: 0.5; }
    .todo-item.priority-high { border-left-color: var(--high); }
    .todo-item.priority-med  { border-left-color: var(--med); }
    .todo-item.priority-low  { border-left-color: var(--low); }

    .todo-main { display: flex; align-items: flex-start; gap: 12px; padding: 14px 12px; }
    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
    }
    .todo-body { flex: 1; min-width: 0; }
    .todo-text { font-size: 1rem; color: var(--text); word-break: break-word; }
    .todo-text[contenteditable="true"] { outline: none; border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--done-text); }
    .todo-note-preview { font-size: 0.8rem; color: var(--subtext); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .todo-meta { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .badge-cat { background: var(--accent-light); color: var(--accent); }
    .badge-high { background: #ffe5e5; color: var(--high); }
    .badge-med  { background: #fff3e0; color: var(--med); }
    .badge-low  { background: #e6f9ec; color: var(--low); }
    .badge-due  { background: var(--item-bg); color: var(--subtext); border: 1px solid var(--border); }
    .badge-overdue { background: #ffe5e5; color: var(--high); }
    .badge-recur { background: #e8f4ff; color: #0070f3; }
    .badge-time { background: #fff8e0; color: #b07d00; font-variant-numeric: tabular-nums; }
    [data-theme="dark"] .badge-high { background: #3a1a1a; }
    [data-theme="dark"] .badge-med  { background: #2a1f00; }
    [data-theme="dark"] .badge-low  { background: #0a2a14; }
    [data-theme="dark"] .badge-cat  { background: #1a1a3a; }
    [data-theme="dark"] .badge-recur { background: #001a33; color: #4da6ff; }
    [data-theme="dark"] .badge-time { background: #2a2000; color: #ffd060; }

    .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; color: var(--subtext); font-size: 1rem;
      cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: color 0.2s, background 0.2s; line-height: 1;
    }
    .icon-btn:hover { color: var(--accent); background: var(--accent-light); }
    .icon-btn.delete:hover { color: #e74c3c; background: #ffe5e5; }
    .icon-btn.timer-active { color: #e74c3c; }

    /* Expandable sections */
    .todo-expand { border-top: 1px solid var(--item-border); padding: 12px 14px 14px 44px; display: none; }
    .todo-expand.open { display: block; }

    /* Notes */
    .notes-section { margin-bottom: 12px; }
    .notes-label { font-size: 0.75rem; font-weight: 600; color: var(--subtext); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .notes-text {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; background: var(--input-bg); color: var(--text);
      font-family: inherit; resize: vertical; min-height: 60px; outline: none; transition: border-color 0.2s;
    }
    .notes-text:focus { border-color: var(--accent); }

    /* Subtasks */
    .subtasks-section { margin-bottom: 12px; }
    .subtask-list { list-style: none; margin-bottom: 8px; }
    .subtask-item {
      display: flex; align-items: center; gap: 8px; padding: 5px 0;
      border-bottom: 1px solid var(--item-border);
    }
    .subtask-item:last-child { border-bottom: none; }
    .subtask-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
    .subtask-text { flex: 1; font-size: 0.88rem; color: var(--text); }
    .subtask-item.done .subtask-text { text-decoration: line-through; color: var(--done-text); }
    .subtask-del { background: none; border: none; color: var(--subtext); cursor: pointer; font-size: 0.85rem; padding: 2px 4px; border-radius: 4px; }
    .subtask-del:hover { color: #e74c3c; }
    .subtask-add-row { display: flex; gap: 6px; }
    .subtask-input {
      flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; background: var(--input-bg); color: var(--text); outline: none;
    }
    .subtask-input:focus { border-color: var(--accent); }
    .subtask-add-btn {
      padding: 6px 12px; background: var(--accent); color: white; border: none;
      border-radius: 8px; font-size: 0.85rem; cursor: pointer;
    }
    .subtask-add-btn:hover { background: var(--accent-hover); }
    .subtask-progress { font-size: 0.75rem; color: var(--subtext); margin-bottom: 6px; }

    /* Time tracker */
    .time-section { display: flex; align-items: center; gap: 10px; }
    .time-display { font-size: 1.1rem; font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; }
    .time-btn {
      padding: 6px 14px; border: none; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-weight: 600;
    }
    .time-btn.start { background: #34c759; color: white; }
    .time-btn.stop  { background: #e74c3c; color: white; }
    .time-btn.reset { background: var(--border); color: var(--text); }

    .empty { text-align: center; color: var(--subtext); padding: 40px 0; font-size: 0.95rem; }
    .footer-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    .footer { font-size: 0.8rem; color: var(--subtext); }
    .export-btn {
      background: none; border: 2px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 0.8rem; cursor: pointer; color: var(--subtext); transition: all 0.2s;
    }
    .export-btn:hover { border-color: var(--accent); color: var(--accent); }
    #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>
  <div class="container">
    <div class="header">
      <div>
        <h1>My To-Do List</h1>
        <p class="subtitle">Stay on top of your day</p>
      </div>
      <button class="dark-toggle" onclick="toggleDark()">🌙</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressLabel">0 of 0 tasks completed</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="search-row">
      <input class="search-input" type="text" id="searchInput" placeholder="🔍  Search tasks..." oninput="render()"/>
    </div>

    <div class="add-form">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>
      <textarea id="taskNote" placeholder="Notes / description (optional)..."></textarea>
      <div class="form-row" style="margin-top:8px">
        <select id="prioritySelect">
          <option value="med">🟡 Medium</option>
          <option value="high">🔴 High</option>
          <option value="low">🟢 Low</option>
        </select>
        <select id="categorySelect">
          <option value="General">📋 General</option>
          <option value="Work">💼 Work</option>
          <option value="Personal">🏠 Personal</option>
          <option value="Shopping">🛒 Shopping</option>
          <option value="Health">❤️ Health</option>
        </select>
        <input type="date" id="dueDateInput" title="Due date"/>
        <select id="recurSelect" title="Recurring">
          <option value="">🔁 No repeat</option>
          <option value="daily">🔁 Daily</option>
          <option value="weekly">🔁 Weekly</option>
          <option value="monthly">🔁 Monthly</option>
        </select>
      </div>
    </div>

    <div class="category-tabs" id="categoryTabs"></div>

    <div class="controls">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
      <button class="filter-btn" onclick="setFilter('overdue', this)">⚠️ Overdue</button>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="added">Sort: Date Added</option>
        <option value="due">Sort: Due Date</option>
        <option value="priority">Sort: Priority</option>
        <option value="name">Sort: Name</option>
      </select>
    </div>

    <ul class="todo-list" id="todoList"></ul>
    <p class="empty" id="emptyMsg" style="display:none">No tasks here! 🎉</p>

    <div class="footer-bar">
      <p class="footer" id="footer"></p>
      <button class="export-btn" onclick="exportPDF()">📄 Export PDF</button>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';
    let activeCategory = 'All';
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let timers = {}; // taskId -> intervalId

    if (darkMode) document.documentElement.setAttribute('data-theme', 'dark');

    function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }
    function toggleDark() {
      darkMode = !darkMode;
      localStorage.setItem('darkMode', darkMode);
      document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
    }

    const PRIORITY_ORDER = { high: 0, med: 1, low: 2 };

    function isOverdue(task) {
      if (!task.due || task.done) return false;
      return new Date(task.due) < new Date(new Date().toDateString());
    }

    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${m}/${d}/${y}`;
    }

    function escHtml(str) {
      return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getSortedVisible() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const sort = document.getElementById('sortSelect').value;
      let result = tasks.filter(t => {
        const matchFilter =
          filter === 'all' ? true :
          filter === 'active' ? !t.done :
          filter === 'done' ? t.done :
          filter === 'overdue' ? isOverdue(t) : true;
        const matchCat = activeCategory === 'All' || t.category === activeCategory;
        const matchSearch = !search || t.text.toLowerCase().includes(search) || (t.note||'').toLowerCase().includes(search);
        return matchFilter && matchCat && matchSearch;
      });
      result.sort((a,b) => {
        if (sort === 'priority') return PRIORITY_ORDER[a.priority||'med'] - PRIORITY_ORDER[b.priority||'med'];
        if (sort === 'name') return a.text.localeCompare(b.text);
        if (sort === 'due') {
          if (!a.due && !b.due) return 0;
          if (!a.due) return 1; if (!b.due) return -1;
          return new Date(a.due) - new Date(b.due);
        }
        return (b.id||0) - (a.id||0);
      });
      return result;
    }

    function renderCategoryTabs() {
      const cats = ['All', ...new Set(tasks.map(t => t.category || 'General'))];
      document.getElementById('categoryTabs').innerHTML = cats.map(c =>
        `<button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
      ).join('');
    }

    function getSubtaskProgress(task) {
      if (!task.subtasks || task.subtasks.length === 0) return null;
      const done = task.subtasks.filter(s => s.done).length;
      return `${done}/${task.subtasks.length} subtasks`;
    }

    function render() {
      renderCategoryTabs();
      const list = document.getElementById('todoList');
      const emptyMsg = document.getElementById('emptyMsg');
      const visible = getSortedVisible();

      list.innerHTML = '';
      visible.forEach(task => {
        const i = tasks.indexOf(task);
        const overdue = isOverdue(task);
        const subtaskProgress = getSubtaskProgress(task);
        const recurLabel = { daily: '🔁 Daily', weekly: '🔁 Weekly', monthly: '🔁 Monthly' }[task.recur] || '';
        const timeStr = formatTime(task.timeSpent || 0);
        const isRunning = !!timers[task.id];

        const li = document.createElement('li');
        li.className = `todo-item priority-${task.priority||'med'}${task.done?' done':''}`;
        li.id = `item-${task.id}`;

        li.innerHTML = `
          <div class="todo-main">
            <input type="checkbox" ${task.done?'checked':''} onchange="toggle(${i})"/>
            <div class="todo-body">
              <span class="todo-text" id="text-${i}">${escHtml(task.text)}</span>
              ${task.note ? `<div class="todo-note-preview">📝 ${escHtml(task.note)}</div>` : ''}
              <div class="todo-meta">
                <span class="badge badge-cat">${task.category||'General'}</span>
                <span class="badge badge-${task.priority||'med'}">${{high:'🔴 High',med:'🟡 Med',low:'🟢 Low'}[task.priority||'med']}</span>
                ${task.due ? `<span class="badge ${overdue&&!task.done?'badge-overdue':'badge-due'}">${overdue&&!task.done?'⚠️ ':' 📅 '}${formatDate(task.due)}</span>` : ''}
                ${recurLabel ? `<span class="badge badge-recur">${recurLabel}</span>` : ''}
                ${subtaskProgress ? `<span class="badge badge-due">☑️ ${subtaskProgress}</span>` : ''}
                ${task.timeSpent > 0 || isRunning ? `<span class="badge badge-time" id="time-badge-${task.id}">⏱ ${timeStr}</span>` : ''}
              </div>
            </div>
            <div class="todo-actions">
              <button class="icon-btn" onclick="toggleExpand(${task.id})" title="Expand">▾</button>
              <button class="icon-btn" onclick="editTask(${i})" title="Edit">✏️</button>
              <button class="icon-btn ${isRunning?'timer-active':''}" onclick="toggleTimer(${task.id})" title="Timer">${isRunning?'⏹':'▶️'}</button>
              <button class="icon-btn delete" onclick="remove(${i})" title="Delete">✕</button>
            </div>
          </div>
          <div class="todo-expand" id="expand-${task.id}">
            <div class="notes-section">
              <div class="notes-label">Notes</div>
              <textarea class="notes-text" placeholder="Add notes..." onchange="saveNote(${i}, this.value)">${escHtml(task.note||'')}</textarea>
            </div>
            <div class="subtasks-section">
              <div class="notes-label">Subtasks ${subtaskProgress ? '— '+subtaskProgress : ''}</div>
              <ul class="subtask-list" id="subtask-list-${task.id}">
                ${(task.subtasks||[]).map((s,si) => `
                  <li class="subtask-item ${s.done?'done':''}">
                    <input type="checkbox" ${s.done?'checked':''} onchange="toggleSubtask(${i},${si})"/>
                    <span class="subtask-text">${escHtml(s.text)}</span>
                    <button class="subtask-del" onclick="removeSubtask(${i},${si})">✕</button>
                  </li>
                `).join('')}
              </ul>
              <div class="subtask-add-row">
                <input class="subtask-input" type="text" id="subtask-input-${task.id}" placeholder="Add a subtask..." onkeydown="if(event.key==='Enter') addSubtask(${i}, ${task.id})"/>
                <button class="subtask-add-btn" onclick="addSubtask(${i}, ${task.id})">+ Add</button>
              </div>
            </div>
            <div class="notes-section">
              <div class="notes-label">Time Tracker</div>
              <div class="time-section">
                <div class="time-display" id="time-display-${task.id}">${timeStr}</div>
                <button class="time-btn ${isRunning?'stop':'start'}" id="time-btn-${task.id}" onclick="toggleTimer(${task.id})">${isRunning?'⏹ Stop':'▶ Start'}</button>
                <button class="time-btn reset" onclick="resetTimer(${task.id})">↺ Reset</button>
              </div>
            </div>
          </div>
        `;
        list.appendChild(li);
      });

      emptyMsg.style.display = visible.length === 0 ? 'block' : 'none';

      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      const pct = total > 0 ? Math.round((done/total)*100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `${done} of ${total} tasks completed`;
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('footer').textContent = total > 0 ? `${tasks.filter(t=>!t.done).length} remaining` : '';

      if (total > 0 && done === total) launchConfetti();
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({
        id: Date.now(), text, done: false,
        priority: document.getElementById('prioritySelect').value,
        category: document.getElementById('categorySelect').value,
        due: document.getElementById('dueDateInput').value || null,
        recur: document.getElementById('recurSelect').value || null,
        note: document.getElementById('taskNote').value.trim(),
        subtasks: [],
        timeSpent: 0,
      });
      input.value = '';
      document.getElementById('taskNote').value = '';
      document.getElementById('dueDateInput').value = '';
      document.getElementById('recurSelect').value = '';
      save(); render();
    }

    function toggle(i) {
      tasks[i].done = !tasks[i].done;
      if (tasks[i].done && tasks[i].recur) scheduleRecurring(i);
      save(); render();
    }

    function scheduleRecurring(i) {
      const t = tasks[i];
      const newTask = { ...t, id: Date.now(), done: false, timeSpent: 0, subtasks: (t.subtasks||[]).map(s=>({...s,done:false})) };
      if (t.due) {
        const d = new Date(t.due);
        if (t.recur === 'daily') d.setDate(d.getDate() + 1);
        else if (t.recur === 'weekly') d.setDate(d.getDate() + 7);
        else if (t.recur === 'monthly') d.setMonth(d.getMonth() + 1);
        newTask.due = d.toISOString().split('T')[0];
      }
      tasks.push(newTask);
    }

    function remove(i) { tasks.splice(i, 1); save(); render(); }

    function editTask(i) {
      const span = document.getElementById('text-' + i);
      if (!span) return;
      span.contentEditable = 'true'; span.focus();
      const range = document.createRange();
      range.selectNodeContents(span);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      span.onblur = () => { tasks[i].text = span.innerText.trim() || tasks[i].text; span.contentEditable = 'false'; save(); render(); };
      span.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); span.blur(); } };
    }

    function saveNote(i, val) { tasks[i].note = val; save(); }

    function toggleExpand(taskId) {
      const el = document.getElementById('expand-' + taskId);
      if (el) el.classList.toggle('open');
    }

    function addSubtask(i, taskId) {
      const input = document.getElementById('subtask-input-' + taskId);
      const text = input.value.trim();
      if (!text) return;
      if (!tasks[i].subtasks) tasks[i].subtasks = [];
      tasks[i].subtasks.push({ text, done: false });
      input.value = '';
      save(); render();
      document.getElementById('expand-' + taskId).classList.add('open');
    }

    function toggleSubtask(i, si) {
      tasks[i].subtasks[si].done = !tasks[i].subtasks[si].done;
      save(); render();
      document.getElementById('expand-' + tasks[i].id).classList.add('open');
    }

    function removeSubtask(i, si) {
      tasks[i].subtasks.splice(si, 1);
      save(); render();
      document.getElementById('expand-' + tasks[i].id).classList.add('open');
    }

    function toggleTimer(taskId) {
      if (timers[taskId]) {
        clearInterval(timers[taskId]);
        delete timers[taskId];
      } else {
        timers[taskId] = setInterval(() => {
          const t = tasks.find(t => t.id === taskId);
          if (!t) { clearInterval(timers[taskId]); delete timers[taskId]; return; }
          t.timeSpent = (t.timeSpent || 0) + 1;
          const str = formatTime(t.timeSpent);
          const disp = document.getElementById('time-display-' + taskId);
          const badge = document.getElementById('time-badge-' + taskId);
          if (disp) disp.textContent = str;
          if (badge) badge.textContent = '⏱ ' + str;
          save();
        }, 1000);
      }
      render();
      document.getElementById('expand-' + taskId)?.classList.add('open');
    }

    function resetTimer(taskId) {
      if (timers[taskId]) { clearInterval(timers[taskId]); delete timers[taskId]; }
      const t = tasks.find(t => t.id === taskId);
      if (t) { t.timeSpent = 0; save(); render(); }
      document.getElementById('expand-' + taskId)?.classList.add('open');
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function setCategory(cat) { activeCategory = cat; render(); }

    function exportPDF() {
      const lines = tasks.map(t => {
        let out = `${t.done?'✓':'○'} [${(t.priority||'med').toUpperCase()}] ${t.text}`;
        if (t.due) out += ` (Due: ${formatDate(t.due)})`;
        if (t.recur) out += ` [${t.recur}]`;
        if (t.note) out += `\n   Note: ${t.note}`;
        if (t.subtasks?.length) out += '\n' + t.subtasks.map(s => `   ${s.done?'✓':'○'} ${s.text}`).join('\n');
        if (t.timeSpent) out += `\n   Time: ${formatTime(t.timeSpent)}`;
        return out;
      }).join('\n\n');
      const win = window.open('', '_blank');
      win.document.write(`<html><head><title>My To-Do List</title>
        <style>body{font-family:sans-serif;padding:40px;max-width:600px;margin:auto}
        h1{margin-bottom:8px}p{color:#888;margin-bottom:24px}pre{font-size:14px;line-height:1.8;white-space:pre-wrap}</style></head>
        <body><h1>My To-Do List</h1><p>Exported ${new Date().toLocaleDateString()}</p>
        <pre>${lines}</pre></body></html>`);
      win.document.close(); win.print();
    }

    let confettiRunning = false;
    function launchConfetti() {
      if (confettiRunning) return;
      confettiRunning = true;
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const pieces = Array.from({length:120}, () => ({
        x: Math.random()*canvas.width, y: Math.random()*-canvas.height,
        r: Math.random()*8+4, d: Math.random()*2+1,
        color: ['#6c63ff','#ff6b6b','#ffd93d','#6bcb77','#4d96ff'][Math.floor(Math.random()*5)],
        tiltAngle: 0,
      }));
      let frame = 0;
      function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(p => {
          ctx.beginPath();
          ctx.ellipse(p.x, p.y, p.r, p.r*0.6, p.tiltAngle, 0, Math.PI*2);
          ctx.fillStyle = p.color; ctx.fill();
          p.y += p.d; p.tiltAngle += 0.05;
          if (p.y > canvas.height) { p.y = -10; p.x = Math.random()*canvas.width; }
        });
        frame++;
        if (frame < 180) requestAnimationFrame(draw);
        else { ctx.clearRect(0,0,canvas.width,canvas.height); confettiRunning = false; }
      }
      draw();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key==='Enter') addTask(); });
    render();
  </script>
</body>
</html>
