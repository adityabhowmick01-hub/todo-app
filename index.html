<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do App</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a2e;
      --subtext: #888;
      --border: #e0e0e0;
      --item-bg: #fafafa;
      --item-border: #f0f0f0;
      --accent: #6c63ff;
      --accent-hover: #574fd6;
      --accent-light: #f0eeff;
      --done-text: #aaa;
      --shadow: rgba(0,0,0,0.08);
      --input-bg: #ffffff;
      --high: #ff4d4d;
      --med: #ff9500;
      --low: #34c759;
      --overdue: #ff4d4d;
    }

    [data-theme="dark"] {
      --bg: #0f0f1a;
      --card: #1e1e2e;
      --text: #e0e0f0;
      --subtext: #666;
      --border: #333355;
      --item-bg: #16162a;
      --item-border: #2a2a44;
      --accent: #7c73ff;
      --accent-hover: #6c63ff;
      --accent-light: #1a1a3a;
      --done-text: #555;
      --shadow: rgba(0,0,0,0.4);
      --input-bg: #16162a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      transition: background 0.3s;
    }

    .container {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow);
      padding: 32px;
      width: 100%;
      max-width: 600px;
      height: fit-content;
      transition: background 0.3s;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    h1 { font-size: 1.8rem; color: var(--text); }
    .subtitle { color: var(--subtext); font-size: 0.9rem; margin-bottom: 20px; }

    .dark-toggle {
      background: none;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--text);
      transition: all 0.2s;
    }
    .dark-toggle:hover { border-color: var(--accent); }

    /* Progress bar */
    .progress-wrap { margin-bottom: 20px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--subtext);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Search */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Add task form */
    .add-form {
      background: var(--item-bg);
      border: 1px solid var(--item-border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .form-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    select, input[type="date"] {
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus, input[type="date"]:focus { border-color: var(--accent); }

    button.add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button.add-btn:hover { background: var(--accent-hover); }

    /* Filters & Sort */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      background: none;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--subtext);
      transition: all 0.2s;
    }
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }
    .sort-select {
      margin-left: auto;
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      background: var(--input-bg);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    /* Category tabs */
    .category-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .cat-btn {
      background: none;
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--subtext);
      transition: all 0.2s;
    }
    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Todo items */
    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: var(--item-bg);
      border: 1px solid var(--item-border);
      border-left: 4px solid transparent;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .todo-item.done { opacity: 0.5; }
    .todo-item.priority-high { border-left-color: var(--high); }
    .todo-item.priority-med  { border-left-color: var(--med); }
    .todo-item.priority-low  { border-left-color: var(--low); }

    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .todo-body { flex: 1; min-width: 0; }

    .todo-text {
      font-size: 1rem;
      color: var(--text);
      word-break: break-word;
    }
    .todo-text[contenteditable="true"] {
      outline: none;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 2px;
    }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .todo-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-cat { background: var(--accent-light); color: var(--accent); }
    .badge-high { background: #ffe5e5; color: var(--high); }
    .badge-med  { background: #fff3e0; color: var(--med); }
    .badge-low  { background: #e6f9ec; color: var(--low); }
    .badge-due  { background: var(--item-bg); color: var(--subtext); border: 1px solid var(--border); }
    .badge-overdue { background: #ffe5e5; color: var(--overdue); }

    [data-theme="dark"] .badge-high { background: #3a1a1a; }
    [data-theme="dark"] .badge-med  { background: #2a1f00; }
    [data-theme="dark"] .badge-low  { background: #0a2a14; }
    [data-theme="dark"] .badge-cat  { background: #1a1a3a; }

    .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--subtext);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .icon-btn:hover { color: var(--accent); background: var(--accent-light); }
    .icon-btn.delete:hover { color: #e74c3c; background: #ffe5e5; }

    .empty {
      text-align: center;
      color: var(--subtext);
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    .footer { font-size: 0.8rem; color: var(--subtext); }

    .export-btn {
      background: none;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--subtext);
      transition: all 0.2s;
    }
    .export-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <div class="container">
    <div class="header">
      <div>
        <h1>My To-Do List</h1>
        <p class="subtitle">Stay on top of your day</p>
      </div>
      <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressLabel">0 of 0 tasks completed</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- Search -->
    <div class="search-row">
      <input class="search-input" type="text" id="searchInput" placeholder="🔍  Search tasks..." oninput="render()"/>
    </div>

    <!-- Add task -->
    <div class="add-form">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>
      <div class="form-row">
        <select id="prioritySelect">
          <option value="med">🟡 Medium</option>
          <option value="high">🔴 High</option>
          <option value="low">🟢 Low</option>
        </select>
        <select id="categorySelect">
          <option value="General">📋 General</option>
          <option value="Work">💼 Work</option>
          <option value="Personal">🏠 Personal</option>
          <option value="Shopping">🛒 Shopping</option>
          <option value="Health">❤️ Health</option>
        </select>
        <input type="date" id="dueDateInput" title="Due date"/>
      </div>
    </div>

    <!-- Category tabs -->
    <div class="category-tabs" id="categoryTabs"></div>

    <!-- Filter & Sort controls -->
    <div class="controls">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
      <button class="filter-btn" onclick="setFilter('overdue', this)">⚠️ Overdue</button>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="added">Sort: Date Added</option>
        <option value="due">Sort: Due Date</option>
        <option value="priority">Sort: Priority</option>
        <option value="name">Sort: Name</option>
      </select>
    </div>

    <ul class="todo-list" id="todoList"></ul>
    <p class="empty" id="emptyMsg" style="display:none">No tasks here! 🎉</p>

    <div class="footer-bar">
      <p class="footer" id="footer"></p>
      <button class="export-btn" onclick="exportPDF()">📄 Export PDF</button>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';
    let activeCategory = 'All';
    let darkMode = localStorage.getItem('darkMode') === 'true';

    if (darkMode) document.documentElement.setAttribute('data-theme', 'dark');

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function toggleDark() {
      darkMode = !darkMode;
      localStorage.setItem('darkMode', darkMode);
      document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
    }

    const PRIORITY_ORDER = { high: 0, med: 1, low: 2 };

    function isOverdue(task) {
      if (!task.due || task.done) return false;
      return new Date(task.due) < new Date(new Date().toDateString());
    }

    function getSortedVisible() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const sort = document.getElementById('sortSelect').value;

      let result = tasks.filter(t => {
        const matchFilter =
          filter === 'all' ? true :
          filter === 'active' ? !t.done :
          filter === 'done' ? t.done :
          filter === 'overdue' ? isOverdue(t) : true;
        const matchCat = activeCategory === 'All' || t.category === activeCategory;
        const matchSearch = !search || t.text.toLowerCase().includes(search);
        return matchFilter && matchCat && matchSearch;
      });

      result.sort((a, b) => {
        if (sort === 'priority') return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
        if (sort === 'name') return a.text.localeCompare(b.text);
        if (sort === 'due') {
          if (!a.due && !b.due) return 0;
          if (!a.due) return 1;
          if (!b.due) return -1;
          return new Date(a.due) - new Date(b.due);
        }
        return (b.id || 0) - (a.id || 0);
      });

      return result;
    }

    function renderCategoryTabs() {
      const cats = ['All', ...new Set(tasks.map(t => t.category || 'General'))];
      const tabs = document.getElementById('categoryTabs');
      tabs.innerHTML = cats.map(c => `
        <button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>
      `).join('');
    }

    function render() {
      renderCategoryTabs();
      const list = document.getElementById('todoList');
      const emptyMsg = document.getElementById('emptyMsg');
      const footer = document.getElementById('footer');
      const visible = getSortedVisible();

      list.innerHTML = '';
      visible.forEach(task => {
        const realIndex = tasks.indexOf(task);
        const overdue = isOverdue(task);
        const li = document.createElement('li');
        li.className = `todo-item priority-${task.priority || 'med'}${task.done ? ' done' : ''}`;

        const dueBadge = task.due
          ? `<span class="badge ${overdue && !task.done ? 'badge-overdue' : 'badge-due'}">
               ${overdue && !task.done ? '⚠️ ' : '📅 '}${formatDate(task.due)}
             </span>`
          : '';

        const priorityLabel = { high: '🔴 High', med: '🟡 Med', low: '🟢 Low' }[task.priority || 'med'];

        li.innerHTML = `
          <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggle(${realIndex})"/>
          <div class="todo-body">
            <span class="todo-text" id="text-${realIndex}">${escHtml(task.text)}</span>
            <div class="todo-meta">
              <span class="badge badge-cat">${task.category || 'General'}</span>
              <span class="badge badge-${task.priority || 'med'}">${priorityLabel}</span>
              ${dueBadge}
            </div>
          </div>
          <div class="todo-actions">
            <button class="icon-btn" onclick="editTask(${realIndex})" title="Edit">✏️</button>
            <button class="icon-btn delete" onclick="remove(${realIndex})" title="Delete">✕</button>
          </div>
        `;
        list.appendChild(li);
      });

      emptyMsg.style.display = visible.length === 0 ? 'block' : 'none';

      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `${done} of ${total} tasks completed`;
      document.getElementById('progressPct').textContent = pct + '%';
      footer.textContent = total > 0 ? `${tasks.filter(t => !t.done).length} remaining` : '';

      if (total > 0 && done === total) launchConfetti();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${m}/${d}/${y}`;
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({
        id: Date.now(),
        text,
        done: false,
        priority: document.getElementById('prioritySelect').value,
        category: document.getElementById('categorySelect').value,
        due: document.getElementById('dueDateInput').value || null,
      });
      input.value = '';
      save();
      render();
    }

    function toggle(i) {
      tasks[i].done = !tasks[i].done;
      save();
      render();
    }

    function remove(i) {
      tasks.splice(i, 1);
      save();
      render();
    }

    function editTask(i) {
      const span = document.getElementById('text-' + i);
      if (!span) return;
      span.contentEditable = 'true';
      span.focus();
      const range = document.createRange();
      range.selectNodeContents(span);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      span.onblur = () => {
        tasks[i].text = span.innerText.trim() || tasks[i].text;
        span.contentEditable = 'false';
        save();
        render();
      };
      span.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); span.blur(); } };
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function setCategory(cat) {
      activeCategory = cat;
      render();
    }

    function exportPDF() {
      const lines = tasks.map((t, i) =>
        `${t.done ? '✓' : '○'} [${(t.priority||'med').toUpperCase()}] ${t.text}${t.due ? ' (Due: ' + formatDate(t.due) + ')' : ''} — ${t.category || 'General'}`
      ).join('\n');

      const win = window.open('', '_blank');
      win.document.write(`
        <html><head><title>My To-Do List</title>
        <style>body{font-family:sans-serif;padding:40px;max-width:600px;margin:auto}
        h1{margin-bottom:8px}p{color:#888;margin-bottom:24px}
        pre{font-size:14px;line-height:2;white-space:pre-wrap}</style></head>
        <body><h1>My To-Do List</h1>
        <p>Exported on ${new Date().toLocaleDateString()}</p>
        <pre>${lines}</pre></body></html>
      `);
      win.document.close();
      win.print();
    }

    /* Confetti */
    let confettiRunning = false;
    function launchConfetti() {
      if (confettiRunning) return;
      confettiRunning = true;
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({length: 120}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        r: Math.random() * 8 + 4,
        d: Math.random() * 2 + 1,
        color: ['#6c63ff','#ff6b6b','#ffd93d','#6bcb77','#4d96ff'][Math.floor(Math.random()*5)],
        tilt: Math.random() * 10 - 5,
        tiltAngle: 0,
      }));

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.beginPath();
          ctx.ellipse(p.x, p.y, p.r, p.r * 0.6, p.tiltAngle, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          p.y += p.d + Math.sin(frame * 0.05) * 0.5;
          p.tiltAngle += 0.05;
          if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
        });
        frame++;
        if (frame < 180) requestAnimationFrame(draw);
        else { ctx.clearRect(0, 0, canvas.width, canvas.height); confettiRunning = false; }
      }
      draw();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
